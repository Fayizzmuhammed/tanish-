  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: blobFloat 8s ease-in-out infinite alternate;
    }
    .blob1 { width: 420px; height: 420px; background: #7c3aed; top: -80px; left: -100px; animation-delay: 0s; }
    .blob2 { width: 320px; height: 320px; background: #db2777; bottom: -60px; right: -80px; animation-delay: 2s; }
    .blob3 { width: 250px; height: 250px; background: #0ea5e9; bottom: 60px; left: 30%; animation-delay: 4s; }

    @keyframes blobFloat {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,20px) scale(1.08); }
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(18,18,22,0.82);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 44px 36px 36px;
      width: 340px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04);
      animation: fadeUp 0.7s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .avatar-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      margin: 0 auto 20px;
    }
    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #db2777, #f59e0b);
      z-index: 0;
      animation: spinGrad 4s linear infinite;
    }
    @keyframes spinGrad {
      from { filter: hue-rotate(0deg); }
      to   { filter: hue-rotate(360deg); }
    }
    .avatar {
      position: relative;
      z-index: 1;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 3px solid #0d0d0d;
      margin: 3px;
      display: block;
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      color: #fff;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .greeting {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
      margin-bottom: 20px;
      letter-spacing: 0.2px;
    }
    .greeting .wave {
      display: inline-block;
      animation: wave 1.6s ease-in-out infinite;
      transform-origin: 70% 70%;
    }
    @keyframes wave {
      0%,100% { transform: rotate(0deg); }
      20%      { transform: rotate(14deg); }
      40%      { transform: rotate(-6deg); }
      60%      { transform: rotate(10deg); }
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, #7c3aed, #db2777);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .message {
      font-size: 14.5px;
      color: rgba(255,255,255,0.78);
      line-height: 1.65;
      margin-bottom: 28px;
      font-weight: 300;
    }
    .message strong { color: #fff; font-weight: 500; }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 15px 28px;
      background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 8px 32px rgba(124,58,237,0.35);
      position: relative;
      overflow: hidden;
    }
    .cta::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
      border-radius: inherit;
    }
    .cta:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 12px 40px rgba(124,58,237,0.5);
      filter: brightness(1.08);
    }
    .cta:active { transform: scale(0.98); }

    .foot-note {
      margin-top: 18px;
      font-size: 11px;
      color: rgba(255,255,255,0.22);
    }
  </style>
</head>
